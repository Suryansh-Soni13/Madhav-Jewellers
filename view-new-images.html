<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>View New Images</title>
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        img {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
        }

        .box {
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>New Images in IMAGES-new/</h1>
    <div class="grid">
        <div class="box"><img src="IMAGES-new/1.jpg">
            <p>1.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/2.jpg">
            <p>2.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/3.jpg">
            <p>3.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/4.jpg">
            <p>4.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/5.jpg">
            <p>5.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/6.jpg">
            <p>6.jpg</p>
        </div>
        <div class="box"><img src="IMAGES-new/7.jpg">
            <p>7.jpg</p>
        </div>
    </div>
</body>

</html>
